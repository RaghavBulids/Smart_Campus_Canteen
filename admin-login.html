<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Smart Canteen</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin-login.css">
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div class="brand-section">
        <span class="logo-icon">🔐</span>
        <h1>Admin <span>Portal</span></h1>
        <p>Enter credentials to access dashboard</p>
      </div>

      <form id="adminLoginForm">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="e.g. admin_canteen" required>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="login-btn">Login to Dashboard</button>
      </form>

      <a href="../index.html" class="back-link">← Back to Student Portal</a>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="admin-login.js"></script>
</body>
</html>
